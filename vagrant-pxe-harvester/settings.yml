---
##########################################################################
# NOTE: this is a YAML file so please pay close attention to the leading #
# spaces as they are significant.                                        #
##########################################################################

#
# harvester_iso_url
# harvester_kernel_url
# harvester_ramdisk_url
# harvester_rootfs_url
#
# Harvester media location. URL schema can be either 'http', 'https' or 'file'.
#
#
# harvester_sha512_url
#
# URL to the SHA512 checksum file for verifying downloaded artifacts.
# All downloaded artifacts (ISO, kernel, initrd, rootfs) will be verified against
# the checksums in this file. The download will fail if checksums don't match.
#
# Examples:
# - For stable releases: https://releases.rancher.com/harvester/v1.7.1/harvester-v1.7.1-amd64.sha512
# - For master branch:   https://releases.rancher.com/harvester/master/harvester-master-amd64.sha512
# - For dev branches:    https://releases.rancher.com/harvester/v1.8/harvester-v1.8-amd64.sha512
#
harvester_sha512_url: https://releases.rancher.com/harvester/master/harvester-master-amd64.sha512

harvester_iso_url: https://releases.rancher.com/harvester/master/harvester-master-amd64.iso
harvester_kernel_url: https://releases.rancher.com/harvester/master/harvester-master-vmlinuz-amd64
harvester_ramdisk_url: https://releases.rancher.com/harvester/master/harvester-master-initrd-amd64
harvester_rootfs_url: https://releases.rancher.com/harvester/master/harvester-master-rootfs-amd64.squashfs
# Defaults to 45 minutes to allow for iso to be downloaded and checksum sha512 to be utilized
harvester_iso_download_and_sha512_check_timeout_seconds: 2700
#
# ipxe_config
#
# iPXE bootloader configuration. These binaries are vendored (downloaded once and
# hosted on the artifact server) with SHA256 checksums for verification.
#
# Version: iPXE 2.0.0+ (g6d2f6) - downloaded from boot.ipxe.org on 2026-03-27
#
# Set ipxe_artifact_server to empty string to use boot.ipxe.org directly , we shouldn't
#
ipxe_config:
  # Empty = use boot.ipxe.org directly (not recommended)
  artifact_server: "http://10.115.1.6/iso/ipxe-binaries-for-vagrant/2026-03-27/"

  # iPXE binaries and their SHA256 checksums
  binaries:
    x86_64_efi:
      filename: ipxe-x86_64.efi
      sha256: 1870e795866bb51b93093379d7d277245d60cdd622315695a5502077e20ed853
    arm64_efi:
      filename: ipxe-arm64.efi
      sha256: 12dfb3b107e3d2212d44f60ce930d06990bcbf9dde1f7f2bbe2531933d4cb922
    undionly:
      filename: undionly.kpxe
      sha256: 67ef19d18c6b4b9f00fa0429ade8b6a282bd1c222db2fa4a83e836ffe0c06706

#
# harvester_cluster_nodes
#
# Current Harvester cluster size. Keep in mind that you need at least 3 nodes to make a cluster.
#
harvester_cluster_nodes: 3

#
# network_config
#
# Harvester network configurations.
#
# NOTE: Random MAC addresses are generated with the following command:
# printf '02:00:00:%02X:%02X:%02X\n' $((RANDOM%256)) $((RANDOM%256)) $((RANDOM%256))
# Ref. https://stackoverflow.com/questions/8484877/mac-address-generator-in-python
#
harvester_network_config:
  # Run as an airgapped environment that only has internet connectivity through an HTTP proxy.
  # The HTTP proxy runs on DHCP server using port 3128
  offline: false

  dhcp_server:
    ip: 192.168.0.254
    subnet: 192.168.0.0
    netmask: 255.255.255.0
    range: 192.168.0.50 192.168.0.130
    https: false
    # Change this to a custom DNS server if you need one for your DHCP scope
    dns_server: 1.1.1.1

  dns_servers:
    # This is a list of DNS servers that will be included in your Harvester OS config
    - 192.168.0.254
    - 8.8.8.8

  # Reserved IPs should be in DHCP subnet BUT outside DHCP range.
  vip:
    ip: 192.168.0.131
    mode: DHCP
    mac: 02:00:00:03:3D:61
  cluster:
    # role: default, management, witness or worker
    - ip: 192.168.0.30
      role: default
      cpu: 8
      memory: 16384
      disk_size: 500G
      mgmt_nic: ens6
      mgmt_mac: 02:00:00:0D:62:E2
    - ip: 192.168.0.31
      role: default
      cpu: 8
      memory: 16384
      disk_size: 500G
      mgmt_nic: ens6
      mgmt_mac: 02:00:00:35:86:92
    - ip: 192.168.0.32
      role: default
      cpu: 8
      memory: 16384
      disk_size: 500G
      mgmt_nic: ens6
      mgmt_mac: 02:00:00:2F:F2:2A
    - ip: 192.168.0.33
      role: default
      cpu: 8
      memory: 8192
      disk_size: 500G
      mgmt_nic: ens6
      mgmt_mac: 02:00:00:A7:E6:FF

#
# harvester_config
#
# Harvester system configurations.
#
harvester_config:
  # static token for cluster join authentication
  token: token

  # for user 'rancher' to SSH Harvester nodes
  password: p@ssword
  ssh_authorized_keys:
    - ssh-rsa  vagrant insecure public key

  ntp_servers:
    - 0.suse.pool.ntp.org
    - 1.suse.pool.ntp.org

  # subsystem to configure sshd, refer to harvester configuration 'os.sshd.sftp'.
  sftp: true

#
# harvester_node_config
#
# Harvester node-specific configurations.
#
harvester_node_config:
  cpu: 8
  memory: 8192
  disk_size: 500G

#
# rancher_config
#
# Rancher setup on K3s cluster.
# Refer support matrix on https://ranchermanager.docs.rancher.com/versions
#
rancher_config:
  enabled: false

  version: v2.13.0
  repo: https://releases.rancher.com/server-charts/latest

  # K3s installation
  k3s_version: v1.34.5+k3s1
  k3s_checksum: sha256:efaa84416cf59f36f7c1b45bd12988dcf0112288f588a9fd5c0fbca6d309e9d9

  # Helm installation
  helm_version: v4.1.3
  helm_checksum: sha256:02ce9722d541238f81459938b84cf47df2fdf1187493b4bfb2346754d82a4700

  # Reserved IP for Rancher. Do not conflict with DHCP range and other reserved IPs.
  ip: 192.168.0.141
  hostname: rancher.192.168.0.141.sslip.io
  password: password1234
  cpu: 2
  memory: 4096

# Settings for an S3 backup target.
# When enabled, this will spin up a Minio container on the PXE server, which can
# act as a backup target.
# The S3 service will be available at http://<dhcp-server-ip>:9000
s3:
  enabled: false
  capacity: "300G"
  port: 9000
  console_port: 9001
  username: admin
  password: password1234
  # RELEASE.2025-09-07T16-13-09Z
  tagged_release_sha256sum: sha256:a1a8bd4ac40ad7881a245bab97323e18f971e4d4cba2c2007ec1bedd21cbaba2
